image:
  repository: zebflow/zebflow
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 10610

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: zebflow.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  ZEBFLOW_PLATFORM_HOST: "0.0.0.0"
  ZEBFLOW_PLATFORM_PORT: "10610"
  ZEBFLOW_PLATFORM_DATA_DIR: "/var/lib/zebflow/data"
  ZEBFLOW_PUBLIC_URL: "http://localhost:10610"

secrets:
  defaultPassword: "changeme"

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}
