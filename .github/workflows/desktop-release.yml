name: Build Desktop Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare desktop version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute desktop version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
            RELEASE=true
          else
            CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            BUILD_TIME=$(date -u +"%Y%m%d%H%M")
            VERSION="${CARGO_VERSION}.${BUILD_TIME}"
            RELEASE=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"
          echo "Desktop version: ${VERSION}"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-14
            artifact: Zebflow-Desktop-macos-arm64.zip
          - name: windows-x64
            runner: windows-latest
            artifact: Zebflow-Desktop-windows-x64.zip
          - name: linux-x64
            runner: ubuntu-latest
            artifact: Zebflow-Desktop-linux-x64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build macOS desktop bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ./desktop/build-macos-app.sh
          cd desktop/dist
          /usr/bin/zip -r "${{ matrix.artifact }}" "Zebflow Desktop.app"

      - name: Build Windows desktop archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release --bin zebflow
          cargo build --release --manifest-path desktop/Cargo.toml
          New-Item -ItemType Directory -Force -Path desktop/dist/windows | Out-Null
          Copy-Item target/release/zebflow.exe desktop/dist/windows/zebflow.exe
          Copy-Item desktop/target/release/zebflow-desktop.exe desktop/dist/windows/zebflow-desktop.exe
          Compress-Archive -Path desktop/dist/windows/* -DestinationPath ("desktop/dist/" + "${{ matrix.artifact }}") -Force

      - name: Build Linux desktop archive
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo build --release --bin zebflow
          cargo build --release --manifest-path desktop/Cargo.toml
          mkdir -p desktop/dist/linux
          cp target/release/zebflow desktop/dist/linux/zebflow
          cp desktop/target/release/zebflow-desktop desktop/dist/linux/zebflow-desktop
          tar -C desktop/dist/linux -czf "desktop/dist/${{ matrix.artifact }}" .

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: desktop/dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    needs: [prepare, build]
    if: needs.prepare.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop-release

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: |
            desktop-release/**/*.zip
            desktop-release/**/*.tar.gz
