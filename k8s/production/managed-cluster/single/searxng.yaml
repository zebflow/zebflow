apiVersion: v1
kind: Secret
metadata:
  name: searxng-secrets
  namespace: zebflow
type: Opaque
stringData:
  SEARXNG_SECRET: "CHANGE_ME_SEARXNG_SECRET"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: zebflow
data:
  settings.yml: |
    use_default_settings: true

    general:
      debug: false
      instance_name: "SearXNG Zebflow"

    search:
      safe_search: 0
      autocomplete: "duckduckgo"
      formats:
        - html
        - json

    server:
      secret_key: "placeholder-overridden-by-env"
      limiter: false
      public_instance: false
      image_proxy: false
      method: "GET"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: zebflow
  labels:
    app: searxng
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      automountServiceAccountToken: false
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SEARXNG_SETTINGS_PATH
              value: /etc/searxng/settings.yml
            - name: SEARXNG_PORT
              value: "8080"
            - name: SEARXNG_BIND_ADDRESS
              value: "0.0.0.0"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secrets
                  key: SEARXNG_SECRET
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
            - name: cache
              mountPath: /var/cache/searxng
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: searxng-config
        - name: cache
          emptyDir:
            sizeLimit: 2Gi
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: zebflow
  labels:
    app: searxng
spec:
  type: ClusterIP
  selector:
    app: searxng
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
