apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zebflow-data
  namespace: zebflow
  labels:
    app: zebflow
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zebflow
  namespace: zebflow
  labels:
    app: zebflow
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zebflow
  template:
    metadata:
      labels:
        app: zebflow
    spec:
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      automountServiceAccountToken: false
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - mkdir -p /var/lib/zebflow/data && chmod -R 0777 /var/lib/zebflow/data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/zebflow/data
      containers:
        - name: zebflow
          image: insanalamin/zebflow:0.2.0.202604100244
          imagePullPolicy: Always
          args:
            - standalone
          ports:
            - name: http
              containerPort: 10610
              protocol: TCP
          env:
            - name: ZEBFLOW_PLATFORM_HOST
              value: "0.0.0.0"
            - name: ZEBFLOW_PLATFORM_PORT
              value: "10610"
            - name: ZEBFLOW_PLATFORM_DATA_DIR
              value: "/var/lib/zebflow/data"
            - name: ZEBFLOW_PLATFORM_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zebflow-secrets
                  key: ZEBFLOW_PLATFORM_DEFAULT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/zebflow/data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zebflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: zebflow
  namespace: zebflow
  labels:
    app: zebflow
spec:
  type: ClusterIP
  selector:
    app: zebflow
  ports:
    - name: http
      port: 10610
      targetPort: http
      protocol: TCP
