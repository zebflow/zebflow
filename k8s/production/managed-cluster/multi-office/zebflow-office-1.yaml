apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zebflow-office-1-data
  namespace: zebflow
  labels:
    app: zebflow-office-1
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zebflow-office-1
  namespace: zebflow
  labels:
    app: zebflow-office-1
    zebflow.role: office
spec:
  selector:
    app: zebflow-office-1
  ports:
    - name: http
      port: 10610
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zebflow-office-1
  namespace: zebflow
  labels:
    app: zebflow-office-1
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zebflow-office-1
  template:
    metadata:
      labels:
        app: zebflow-office-1
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - mkdir -p /var/lib/zebflow/data && chmod -R 0777 /var/lib/zebflow/data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/zebflow/data
      containers:
        - name: zebflow
          image: insanalamin/zebflow:0.2.0.202604100244
          imagePullPolicy: Always
          args:
            - office
          env:
            - name: ZEBFLOW_PLATFORM_HOST
              value: "0.0.0.0"
            - name: ZEBFLOW_PLATFORM_PORT
              value: "10610"
            - name: ZEBFLOW_PLATFORM_DATA_DIR
              value: /var/lib/zebflow/data
            - name: ZEBFLOW_CLUSTER_NODE_ID
              value: zebflow-office-1
            - name: ZEBFLOW_CLUSTER_NODE_LABEL
              value: Office 1
            - name: ZEBFLOW_CLUSTER_MASTER_URL
              value: http://zebflow-main.zebflow.svc.cluster.local:10610
            - name: ZEBFLOW_CLUSTER_ADVERTISE_URL
              value: http://zebflow-office-1.zebflow.svc.cluster.local:10610
            - name: ZEBFLOW_CLUSTER_JOIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zebflow-cluster-secrets
                  key: ZEBFLOW_CLUSTER_JOIN_TOKEN
          ports:
            - containerPort: 10610
              name: http
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /var/lib/zebflow/data
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zebflow-office-1-data
