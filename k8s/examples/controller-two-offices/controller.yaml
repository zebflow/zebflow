apiVersion: v1
kind: Service
metadata:
  name: zebflow-controller
  namespace: zebflow-test
  labels:
    app.kubernetes.io/name: zebflow
    app.kubernetes.io/component: controller
spec:
  selector:
    app.kubernetes.io/name: zebflow
    app.kubernetes.io/component: controller
  ports:
    - name: http
      port: 10610
      targetPort: 10610
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zebflow-controller
  namespace: zebflow-test
  labels:
    app.kubernetes.io/name: zebflow
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zebflow
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zebflow
        app.kubernetes.io/component: controller
    spec:
      automountServiceAccountToken: false
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      containers:
        - name: zebflow
          image: insanalamin/zebflow:0.2.0.202604100244
          imagePullPolicy: IfNotPresent
          args: ["controller"]
          ports:
            - containerPort: 10610
              name: http
          env:
            - name: ZEBFLOW_PLATFORM_HOST
              value: "0.0.0.0"
            - name: ZEBFLOW_PLATFORM_PORT
              value: "10610"
            - name: ZEBFLOW_PLATFORM_DATA_DIR
              value: "/var/lib/zebflow/data"
            - name: ZEBFLOW_PLATFORM_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zebflow-cluster-secret
                  key: default_password
            - name: ZEBFLOW_CLUSTER_NODE_ID
              value: "controller-1"
            - name: ZEBFLOW_CLUSTER_NODE_LABEL
              value: "Controller 1"
            - name: ZEBFLOW_CLUSTER_ADVERTISE_URL
              value: "http://zebflow-controller.zebflow-test.svc.cluster.local:10610"
            - name: ZEBFLOW_CLUSTER_JOIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zebflow-cluster-secret
                  key: cluster_join_token
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            tcpSocket:
              port: 10610
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 10610
            initialDelaySeconds: 10
            periodSeconds: 10
